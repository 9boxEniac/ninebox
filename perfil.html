<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <h2>Meu Perfil</h2>
  <a href="index.html">Voltar</a>
</header>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item">
      <a href="index.html" class="navbar-link">
        <i class="fa-solid fa-home"></i>
        <span>Início</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="pages/cadastrar.html" class="navbar-link">
        <i class="fa-solid fa-user-plus"></i>
        <span>Cadastrar</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="pages/consultar.html" class="navbar-link">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Consultar</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="pages/avaliacoes.html" class="navbar-link">
        <i class="fa-solid fa-star"></i>
        <span>Avaliações</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="pages/nine-box.html" class="navbar-link">
        <i class="fa-solid fa-th"></i>
        <span>Nine Box</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="pages/relatorios.html" class="navbar-link">
        <i class="fa-solid fa-chart-bar"></i>
        <span>Relatórios</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="perfil.html" class="navbar-link active">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="pages/sobre.html" class="navbar-link">
        <i class="fa-solid fa-circle-info"></i>
        <span>Sobre</span>
      </a>
    </li>
  </ul>
</nav>

<main class="wrapper pg-wrapper">

  <div class="pf-login-card" id="tela-login">
    <div class="pf-login-icon">
      <i class="fa-solid fa-user-lock"></i>
    </div>
    <h3>Acessar Perfil</h3>
    <p class="pf-login-desc">Digite seu e-mail acadêmico e senha para acessar.</p>

    <div class="pg-field">
      <label for="login-email">E-mail acadêmico</label>
      <input type="email" id="login-email" placeholder="nome@universidade.edu.br"
             onkeydown="if(event.key==='Enter') entrar()">
    </div>

    <div class="pg-field">
      <label for="login-senha">Senha</label>
      <input type="password" id="login-senha" placeholder="Digite sua senha"
             onkeydown="if(event.key==='Enter') entrar()">
    </div>

    <button class="pg-btn" onclick="entrar()">
      <i class="fa-solid fa-right-to-bracket"></i> Entrar
    </button>
  </div>

  <!-- TELA DE PERFIL -->
  <div class="pf-layout" id="tela-perfil" style="display:none">

    <!-- CARD ESQUERDO — foto + info -->
    <div class="pf-card pf-card-left">

      <!-- Foto -->
      <div class="pf-foto-wrap">
        <div class="pf-foto" id="pf-foto-preview" onclick="document.getElementById('pf-foto-input').click()">
          <span id="pf-foto-iniciais"></span>
          <div class="pf-foto-overlay"><i class="fa-solid fa-camera"></i></div>
        </div>
        <input type="file" id="pf-foto-input" accept="image/*" style="display:none" onchange="trocarFoto(this)">
        <p class="pf-foto-hint">Clique para alterar</p>
      </div>

      <!-- Nome e tipo -->
      <h3 class="pf-nome" id="pf-nome-display"></h3>
      <span class="pg-badge pf-tipo-badge" id="pf-tipo-badge"></span>

      <!-- Stats -->
      <div class="pf-stats" id="pf-stats"></div>

      <!-- Sair -->
      <button class="pf-btn-sair" onclick="sair()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </button>

    </div>

    <!-- CARD DIREITO — edição + avaliações -->
    <div class="pf-card pf-card-right">

      <!-- Tabs -->
      <div class="pf-tabs">
        <button class="pf-tab active" data-tab="dados" onclick="setTab('dados')">
          <i class="fa-solid fa-pen"></i> Meus Dados
        </button>
        <button class="pf-tab" data-tab="avaliacoes" onclick="setTab('avaliacoes')">
          <i class="fa-solid fa-star"></i> Minhas Avaliações
        </button>
      </div>

      <!-- ABA: DADOS -->
      <div class="pf-tab-content" id="tab-dados">

        <div class="pg-field">
          <label for="pf-nome">Nome completo</label>
          <input type="text" id="pf-nome" placeholder="Seu nome">
        </div>

        <div class="pg-field">
          <label for="pf-email">E-mail acadêmico</label>
          <input type="email" id="pf-email" placeholder="seu@email.com" readonly
                 style="background:#f0f0f0;cursor:not-allowed;color:#888">
        </div>

        <div class="pg-field" id="pf-campo-senha">
          <label for="pf-senha">Nova senha <span class="av-opcional">(deixe em branco para manter)</span></label>
          <input type="password" id="pf-senha" placeholder="Digite nova senha" autocomplete="new-password">
        </div>

        <div class="pg-field" id="pf-campo-disciplina" style="display:none">
          <label for="pf-disciplina">Disciplina</label>
          <input type="text" id="pf-disciplina" placeholder="Ex: Engenharia de Software">
        </div>

        <div class="pg-field">
          <label for="pf-bio">Sobre mim <span class="av-opcional">(opcional)</span></label>
          <textarea id="pf-bio" placeholder="Conte um pouco sobre você..." style="width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;resize:vertical;min-height:80px;background:#fafafa;"></textarea>
        </div>

        <button class="pg-btn" onclick="salvarPerfil()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar Alterações
        </button>

      </div>

      <!-- ABA: AVALIAÇÕES -->
      <div class="pf-tab-content" id="tab-avaliacoes" style="display:none">
        <div id="pf-avaliacoes-lista">
          <p class="pg-empty">Nenhuma avaliação recebida ainda.</p>
        </div>
      </div>

    </div>
  </div>

</main>

<script src="css/js/script.js"></script>
<script src="css/js/perfil.js"></script>
<script src="css/js/navbar.js"></script>
</body>
</html>
